version: "3.9"

services:
  frontend:
    image: node:20-alpine
    container_name: vue3_vite
    working_dir: /app
    ports:
      - "5173:5173"        # Port HTTP Vite
      - "5173:5173/udp"    # WebSocket pour hot reload
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 500
      WATCHPACK_POLLING: "true"
